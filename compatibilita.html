<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compatibilità di coppia</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
<style>
  :root{
    --ink:#0A0A0A; --mustard:#E8A820; --teal:#5FA8A0; --cream:#F7F3EC; --muted:#A69F8F; --line:rgba(247,243,236,0.16); --card:#141414;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--ink);color:var(--cream);font-family:Montserrat,'Segoe UI',sans-serif;font-size:16px;}
  .wrap{max-width:560px;margin:0 auto;padding:28px 18px 80px;}
  h1{font-family:'Arial Black',Montserrat,sans-serif;font-size:32px;letter-spacing:.5px;margin:8px 0 10px;}
  h2{font-size:18px;color:var(--mustard);text-transform:uppercase;letter-spacing:.5px;margin:28px 0 12px;}
  p.lead{color:var(--muted);font-size:16px;line-height:1.6;}
  .explainer{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin:16px 0;font-size:14px;color:var(--muted);line-height:1.6;}
  .explainer b{color:var(--cream);}
  label{display:block;font-size:14px;color:var(--muted);margin:14px 0 6px;}
  input[type=text], input[type=email], input[type=tel], input[type=date], input[type=time], textarea, select{
    width:100%;background:var(--ink);border:1px solid var(--line);border-radius:8px;
    padding:13px 14px;color:var(--cream);font-size:16px;font-family:inherit;}
  textarea{resize:vertical;}
  .progress-wrap{margin-bottom:22px;}
  .progress-bar{height:6px;background:var(--card);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--mustard);transition:width .25s ease;}
  .progress-text{font-size:13px;color:var(--muted);margin-top:6px;}
  .cat-title{font-size:22px;font-weight:700;margin:4px 0 18px;color:var(--cream);}
  .item{margin-bottom:30px;padding-bottom:24px;border-bottom:1px solid var(--line);}
  .item:last-child{border-bottom:none;}
  .param-name{font-size:12px;color:var(--mustard);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
  .item-title{font-size:16px;color:var(--cream);margin-bottom:8px;line-height:1.4;}
  .block{border-radius:12px;padding:14px 14px 6px;margin-top:8px;}
  .block.pos{background:rgba(232,168,32,0.08);border:1px solid rgba(232,168,32,0.3);}
  .block.imp{background:rgba(95,168,160,0.08);border:1px solid rgba(95,168,160,0.35);margin-top:14px;}
  .block-label{font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
  .block.pos .block-label{color:var(--mustard);}
  .block.imp .block-label{color:var(--teal);}
  .range-row{position:relative;}
  input[type=range]{width:100%;height:30px;}
  input[type=range].pos-slider{accent-color:var(--mustard);}
  input[type=range].imp-slider{accent-color:var(--teal);}
  .scale-nums{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:0 2px;margin-top:-4px;}
  .range-value{display:inline-block;min-width:34px;text-align:center;font-weight:800;font-size:12px;border-radius:6px;padding:2px 7px;}
  .block.pos .range-value{background:var(--mustard);color:var(--ink);}
  .block.imp .range-value{background:var(--teal);color:var(--ink);}
  .poles{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin:6px 0 10px;line-height:1.35;}
  .poles span{max-width:47%;}
  .poles span:last-child{text-align:right;}
  .nav-row{display:flex;gap:10px;margin-top:26px;}
  button{cursor:pointer;font-family:inherit;}
  button.primary{flex:1;background:var(--mustard);color:var(--ink);font-weight:700;border:none;border-radius:10px;padding:15px 0;font-size:16px;}
  button.secondary{flex:1;background:transparent;color:var(--cream);border:1px solid var(--line);border-radius:10px;padding:15px 0;font-size:15px;}
  button:disabled{opacity:.5;cursor:not-allowed;}
  .code-box{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin-top:14px;text-align:center;}
  .code-big{font-size:26px;font-weight:800;color:var(--mustard);letter-spacing:1px;margin:6px 0;}
  .score-card{text-align:center;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px 0;margin-top:10px;}
  .score-num{font-size:48px;font-weight:800;color:var(--mustard);}
  .score-label{color:var(--muted);font-size:14px;}
  .topic{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:10px;}
  .topic .cat-name{font-size:12px;color:var(--mustard);text-transform:uppercase;letter-spacing:.5px;}
  .topic .stmt{font-size:15px;color:var(--cream);margin:6px 0;line-height:1.4;}
  .topic .vals{font-size:13px;color:var(--muted);}
  .hidden{display:none !important;}
  .note{font-size:13px;color:var(--muted);margin-top:8px;}
  .err{font-size:13px;color:#E86B5C;margin-top:8px;}
  .tag{display:inline-flex;align-items:center;gap:6px;font-size:12px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
  .field-row{display:flex;gap:10px;}
  .field-row > div{flex:1;}
  .radio-row{display:flex;gap:14px;margin-top:6px;}
  .radio-row label{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--cream);margin:0;}
  .ai-box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:24px;white-space:pre-wrap;font-size:14px;line-height:1.6;color:var(--cream);}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--mustard);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

    {id:"fr2",type:"pair",param:"Condividere la posizione",a:"Non è necessario riferire sempre dove ci si trova",b:"È importante sapere sempre dove si trova il partner"},

const FORMSPREE_ENDPOINT = "https://formspree.io/f/xnjebzdn";
const PAIR_ENDPOINT = "/.netlify/functions/pair-data";
const AI_ENDPOINT = "/.netlify/functions/astro-analysis";

/* ================= STATO ================= */
let answers = {};
CATEGORIES.forEach(cat => cat.items.forEach(it=>{
  if(it.type==="open") answers[it.id]={text:""};
  else answers[it.id]={p:3,w:3};
}));
let myCoupleCode = "";
let myDisplayName = "";
let myBirthDate = "";
let myBirthTime = "";
let myBirthPlace = "";
let myHadLongRelationship = "";
let screen = "setup"; // setup | quiz | lead | waiting | results
let catIndex = 0;
let lastResults = null;

const app = document.getElementById("app");

/* ================= HELPERS ================= */
function itemRisk(a,b){
  const diff = Math.abs((a?.p??3)-(b?.p??3))/4;
  const w = (((a?.w??3)+(b?.w??3))/2)/5;
  return diff*w;
}
function posLabel(it,val){
  if(it.type==="pair"){
    if(val<=2) return `vicino a «${it.a}»`;
    if(val>=4) return `vicino a «${it.b}»`;
    return "neutro / a metà";
  }
  return `${val}/5`;
}
function zodiacSign(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr);
  const day = d.getDate(), month = d.getMonth()+1;
  const signs = [
    [20,"Capricorno"],[19,"Acquario"],[20,"Pesci"],[20,"Ariete"],[21,"Toro"],[21,"Gemelli"],
    [22,"Cancro"],[23,"Leone"],[23,"Vergine"],[23,"Bilancia"],[22,"Scorpione"],[22,"Sagittario"],[31,"Capricorno"]
  ];
  const cutoff = signs[month-1][0];
  return day <= cutoff ? signs[month-1][1] : signs[month][1];
}

/* ================= RENDER ================= */
function render(){
  if(screen==="setup") return renderSetup();
  if(screen==="quiz") return renderQuiz();
  if(screen==="lead") return renderLead();
  if(screen==="waiting") return renderWaiting();
  if(screen==="results") return renderResults();
}

function renderSetup(){
  app.innerHTML = `
    <div class="tag">🔒 Un codice, condiviso in coppia</div>
    <h1>Compatibilità</h1>
    <p class="lead">Rispondi alle domande su valori e aspettative nella coppia. Alla fine potrai confrontare le tue risposte con quelle del tuo partner.</p>
    <div class="explainer">
      Per <b>ogni</b> tema valuterai due cose separate, sempre con due cursori distinti:<br>
      🟡 1) la tua <b>posizione</b> su quel tema,<br>
      🔵 2) quanto per te è importante <b>coincidere con il partner</b> su questo punto — anche se la tua posizione è neutra, la coincidenza può comunque essere fondamentale per te (o viceversa). Il numero accanto a ogni cursore (es. "3/5") è il valore attuale su una scala da 1 a 5.
    </div>
    <label>Il tuo nome</label>
    <input type="text" id="inName" placeholder="es. Olga">
    <label>Codice della coppia</label>
    <input type="text" id="inCode" placeholder="es. OlgaErmanno26">
    <p class="note">Inventalo tu o il partner e usate <b style="color:var(--cream)">esattamente lo stesso codice</b> entrambi — è l'unica cosa che dovete comunicarvi. Quando entrambi avete completato il questionario con lo stesso codice, il confronto appare automaticamente.</p>
    <p class="err hidden" id="setupErr"></p>
    <div class="nav-row">
      <button class="primary" id="btnStart">Inizia</button>
    </div>`;
  document.getElementById("btnStart").onclick = ()=>{
    const name = document.getElementById("inName").value.trim();
    const code = document.getElementById("inCode").value.trim();
    if(!name || !code){
      const e = document.getElementById("setupErr");
      e.textContent = "Inserisci nome e codice della coppia.";
      e.classList.remove("hidden");
      return;
    }
    myDisplayName = name; myCoupleCode = code; catIndex = 0; screen = "quiz"; render();
  };
}

function renderQuiz(){
  const cat = CATEGORIES[catIndex];
  const total = CATEGORIES.length;
  const pct = Math.round(((catIndex+1)/total)*100);
  let itemsHtml = "";
  cat.items.forEach(it=>{
    if(it.type==="open"){
      itemsHtml += `
        <div class="item">
          <div class="item-title">${it.label}</div>
          <textarea rows="3" id="${it.id}_text">${answers[it.id].text}</textarea>
        </div>`;
      return;
    }
    const pv = answers[it.id].p, wv = answers[it.id].w;
    const posHeader = it.type==="pair" ? "La tua posizione" : "La tua valutazione";
    itemsHtml += `
      <div class="item">
        <div class="param-name">${it.param}</div>
        <div class="block pos">
          <div class="block-label"><span>${posHeader}</span><span class="range-value" id="val_${it.id}_p">${pv}/5</span></div>
          ${it.type==="single" ? `<div class="item-title" style="margin:2px 0 8px;font-size:14px;">${it.label}</div>` : ""}
          <input type="range" class="pos-slider" min="1" max="5" value="${pv}" id="${it.id}_p">
          <div class="scale-nums"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>
          ${it.type==="pair" ? `<div class="poles"><span>${it.a}</span><span>${it.b}</span></div>` : `<div class="poles"><span>non importante / non d'accordo</span><span>fondamentale / pienamente d'accordo</span></div>`}
        </div>
        <div class="block imp">
          <div class="block-label"><span>Quanto conta coincidere</span><span class="range-value" id="val_${it.id}_w">${wv}/5</span></div>
          <input type="range" class="imp-slider" min="1" max="5" value="${wv}" id="${it.id}_w">
          <div class="scale-nums"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>
          <div class="poles"><span>non importante</span><span>fondamentale</span></div>
        </div>
      </div>`;
  });

  app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-text">Pagina ${catIndex+1} di ${total}</div>
    </div>
    <div class="cat-title">${cat.title}</div>
    ${itemsHtml}
    <div class="nav-row">
      <button class="secondary" id="btnBack" ${catIndex===0?"disabled":""}>Indietro</button>
      <button class="primary" id="btnNext">${catIndex===total-1 ? "Continua" : "Avanti"}</button>
    </div>`;

  cat.items.forEach(it=>{
    if(it.type==="open"){
      const tEl = document.getElementById(it.id+"_text");
      tEl.oninput = ()=>{ answers[it.id].text = tEl.value; };
      return;
    }
    const pEl = document.getElementById(it.id+"_p"), wEl = document.getElementById(it.id+"_w");
    pEl.oninput = ()=>{ answers[it.id].p = Number(pEl.value); document.getElementById("val_"+it.id+"_p").textContent = pEl.value+"/5"; };
    wEl.oninput = ()=>{ answers[it.id].w = Number(wEl.value); document.getElementById("val_"+it.id+"_w").textContent = wEl.value+"/5"; };
  });

  document.getElementById("btnBack").onclick = ()=>{ if(catIndex>0){ catIndex--; render(); } else { screen="setup"; render(); } };
  document.getElementById("btnNext").onclick = ()=>{
    if(catIndex < total-1){ catIndex++; render(); window.scrollTo(0,0); }
    else { screen = "lead"; render(); }
  };
}

function renderLead(){
  app.innerHTML = `
    <h1 style="font-size:26px;">Ultimo passo</h1>
    <p class="lead">Per salvare le tue risposte sotto il codice della coppia e vedere il confronto, lascia i tuoi contatti.</p>
    <div class="field-row">
      <div><label>Nome</label><input type="text" id="leadFirst"></div>
      <div><label>Cognome</label><input type="text" id="leadLast"></div>
    </div>
    <label>Email</label>
    <input type="email" id="leadEmail">
    <label>Numero di telefono</label>
    <input type="tel" id="leadPhone">
    <label>Data di nascita</label>
    <input type="date" id="leadBirthDate">
    <label>Sei mai stato/a in una relazione lunga (oltre un anno)?</label>
    <div class="radio-row">
      <label><input type="radio" name="longRel" value="si"> Sì</label>
      <label><input type="radio" name="longRel" value="no"> No</label>
    </div>
    <label style="margin-top:20px;">Facoltativo — per l'analisi astrologica (ascendente)</label>
    <div class="field-row">
      <div><label>Ora di nascita</label><input type="time" id="leadBirthTime"></div>
      <div><label>Città di nascita</label><input type="text" id="leadBirthPlace"></div>
    </div>
    <p class="note">L'ascendente esatto richiede un calcolo astronomico preciso: senza ora e città non potrà essere calcolato, solo il segno solare.</p>
    <p class="err hidden" id="leadErr"></p>
    <div class="nav-row">
      <button class="secondary" id="btnLeadBack">Indietro</button>
      <button class="primary" id="btnLeadSend">Salva e continua</button>
    </div>`;
  document.getElementById("btnLeadBack").onclick = ()=>{ screen="quiz"; catIndex=CATEGORIES.length-1; render(); };
  document.getElementById("btnLeadSend").onclick = async ()=>{
    const first = document.getElementById("leadFirst").value.trim();
    const last = document.getElementById("leadLast").value.trim();
    const email = document.getElementById("leadEmail").value.trim();
    const phone = document.getElementById("leadPhone").value.trim();
    const birthDate = document.getElementById("leadBirthDate").value;
    const longRelEl = document.querySelector('input[name="longRel"]:checked');
    const birthTime = document.getElementById("leadBirthTime").value;
    const birthPlace = document.getElementById("leadBirthPlace").value.trim();
    const errEl = document.getElementById("leadErr");
    if(!first || !last || !/^\S+@\S+\.\S+$/.test(email) || !phone || !birthDate || !longRelEl){
      errEl.textContent = "Compila nome, cognome, email valida, telefono, data di nascita e la domanda sulle relazioni passate.";
      errEl.classList.remove("hidden");
      return;
    }
    myBirthDate = birthDate; myBirthTime = birthTime; myBirthPlace = birthPlace; myHadLongRelationship = longRelEl.value;
    const btn = document.getElementById("btnLeadSend");
    btn.disabled = true; btn.textContent = "Salvataggio…";

    try{
      await fetch(FORMSPREE_ENDPOINT, {
        method:"POST",
        headers:{ "Content-Type":"application/json", "Accept":"application/json" },
        body: JSON.stringify({
          nome:first, cognome:last, email, telefono:phone,
          data_nascita:birthDate, relazione_lunga_precedente:longRelEl.value,
          ora_nascita:birthTime, citta_nascita:birthPlace,
          codice:myCoupleCode, quiz:"Compatibilità di coppia"
        })
      });
    }catch(e){ /* anche se l'invio a Formspree fallisce, si prosegue comunque */ }

    try{
      await fetch(PAIR_ENDPOINT, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          code: myCoupleCode,
          name: myDisplayName,
          data: { answers, birthDate:myBirthDate, birthTime:myBirthTime, birthPlace:myBirthPlace, hadLongRelationship:myHadLongRelationship }
        })
      });
    }catch(e){
      errEl.textContent = "Le risposte non sono state salvate sul server (problema di connessione). Riprova.";
      errEl.classList.remove("hidden");
      btn.disabled = false; btn.textContent = "Salva e continua";
      return;
    }
    screen = "waiting"; render();
  };
}

async function checkPairRecord(){
  const res = await fetch(`${PAIR_ENDPOINT}?code=${encodeURIComponent(myCoupleCode)}`);
  const data = await res.json();
  return data.record || {};
}

function renderWaiting(){
  app.innerHTML = `
    <h1 style="font-size:26px;">In attesa del partner</h1>
    <div class="code-box">
      <div class="note">Codice della coppia</div>
      <div class="code-big">${myCoupleCode}</div>
      <div class="note">Assicurati che il partner inserisca esattamente questo codice.</div>
    </div>
    <p class="lead" style="margin-top:18px;">Le tue risposte sono salvate. Appena anche il partner avrà finito con lo stesso codice, il confronto apparirà qui.</p>
    <div class="nav-row"><button class="primary" id="btnCheck"><span id="checkLabel">Controlla se il partner ha finito</span></button></div>
    <p class="err hidden" id="waitErr"></p>`;
  document.getElementById("btnCheck").onclick = async ()=>{
    const btn = document.getElementById("btnCheck");
    btn.disabled = true; document.getElementById("checkLabel").innerHTML = `<span class="spinner"></span> Controllo…`;
    try{
      const record = await checkPairRecord();
      const partnerName = Object.keys(record).find(n => n !== myDisplayName);
      if(partnerName){
        lastResults = computeResults(partnerName, record[partnerName]);
        screen = "results"; render();
        return;
      }
      document.getElementById("waitErr").classList.add("hidden");
    }catch(e){
      document.getElementById("waitErr").textContent = "Non riesco a contattare il server. Riprova tra poco.";
      document.getElementById("waitErr").classList.remove("hidden");
    }
    btn.disabled = false; document.getElementById("checkLabel").textContent = "Controlla se il partner ha finito";
  };
  // controllo automatico all'apertura della schermata
  document.getElementById("btnCheck").click();
}

function computeResults(partnerName, partnerData){
  const catScores = []; const topics = [];
  CATEGORIES.forEach(cat=>{
    if(cat.id==="open") return;
    let sum=0,n=0;
    cat.items.forEach(it=>{
      const risk = itemRisk(answers[it.id], partnerData.answers[it.id]);
      sum+=risk; n++;
      if(risk>0) topics.push({cat:cat.title,item:it,risk,a:answers[it.id],b:partnerData.answers[it.id]});
    });
    catScores.push({category:cat.title, compat: n? Math.round((1-sum/n)*100):100});
  });
  const overall = Math.round(catScores.reduce((s,c)=>s+c.compat,0)/catScores.length);
  topics.sort((x,y)=>y.risk-x.risk);
  return { overall, catScores, topics: topics.slice(0,10), partnerName, partnerData };
}

let radarChartInstance = null;
function renderResults(){
  const r = lastResults;
  app.innerHTML = `
    <h1 style="font-size:26px;">Risultato</h1>
    <div class="score-card">
      <div class="score-num">${r.overall}%</div>
      <div class="score-label">compatibilità complessiva</div>
    </div>
    <canvas id="radarChart" height="280"></canvas>
    <h2>Temi da discutere di persona</h2>
    <div id="topicsList"></div>
    <h2>Aspettative emotive — a confronto</h2>
    <div id="openList"></div>

    <h2>Analisi astrologica AI</h2>
    <p class="note">Basata sul segno solare (dalla data di nascita) e sulle vostre risposte aperte. L'ascendente preciso richiede un calcolo astronomico con ora e luogo di nascita — qui viene usato solo se lo hai inserito, come indicazione orientativa.</p>
    <div class="nav-row"><button class="primary" id="btnAi">Genera analisi astrologica AI</button></div>
    <div id="aiResult"></div>

    <div class="nav-row"><button class="secondary" id="btnBackToWaiting">Torna indietro</button></div>`;

  const ctx = document.getElementById("radarChart").getContext("2d");
  if(radarChartInstance) radarChartInstance.destroy();
  radarChartInstance = new Chart(ctx, {
    type:"radar",
    data:{ labels: r.catScores.map(c=>c.category),
      datasets:[{ label:"Compatibilità", data: r.catScores.map(c=>c.compat),
        backgroundColor:"rgba(232,168,32,0.35)", borderColor:"#E8A820", pointBackgroundColor:"#E8A820" }] },
    options:{ scales:{ r:{ min:0, max:100,
        grid:{color:"rgba(247,243,236,0.16)"}, angleLines:{color:"rgba(247,243,236,0.16)"},
        pointLabels:{color:"#F7F3EC",font:{size:11}}, ticks:{color:"#A69F8F",backdropColor:"transparent",font:{size:9}} } },
      plugins:{ legend:{display:false} } }
  });

  const topicsList = document.getElementById("topicsList");
  if(r.topics.length===0){
    topicsList.innerHTML = `<p class="note">Nessuna differenza significativa trovata — bene così.</p>`;
  } else {
    r.topics.forEach(t=>{
      const stmt = t.item.type==="pair" ? `«${t.item.a}» — «${t.item.b}»` : t.item.label;
      const av = posLabel(t.item,t.a?.p);
      const bv = posLabel(t.item,t.b?.p);
      const div = document.createElement("div");
      div.className="topic";
      div.innerHTML = `<div class="cat-name">${t.cat}</div><div class="stmt">${stmt}</div>
        <div class="vals">${myDisplayName}: ${av} · ${r.partnerName}: ${bv}</div>`;
      topicsList.appendChild(div);
    });
  }

  const openList = document.getElementById("openList");
  CATEGORIES.find(c=>c.id==="open").items.forEach(it=>{
    const div = document.createElement("div");
    div.className="topic";
    div.innerHTML = `<div class="stmt">${it.label}</div>
      <div class="vals" style="color:#E8A820">${myDisplayName}: <span style="color:#A69F8F">${answers[it.id]?.text||"—"}</span></div>
      <div class="vals" style="color:#E8A820;margin-top:4px">${r.partnerName}: <span style="color:#A69F8F">${(r.partnerData.answers[it.id]&&r.partnerData.answers[it.id].text)||"—"}</span></div>`;
    openList.appendChild(div);
  });

  document.getElementById("btnAi").onclick = async ()=>{
    const btn = document.getElementById("btnAi");
    const out = document.getElementById("aiResult");
    btn.disabled = true; btn.textContent = "Sto generando…";
    out.innerHTML = "";
    const openItems = CATEGORIES.find(c=>c.id==="open").items;
    const me = {
      name: myDisplayName, sunSign: zodiacSign(myBirthDate),
      birthTime: myBirthTime, birthPlace: myBirthPlace,
      hadLongRelationship: myHadLongRelationship,
      openAnswers: openItems.map(it=>({q:it.label, a:answers[it.id]?.text||""}))
    };
    const partner = {
      name: r.partnerName, sunSign: zodiacSign(r.partnerData.birthDate),
      birthTime: r.partnerData.birthTime, birthPlace: r.partnerData.birthPlace,
      hadLongRelationship: r.partnerData.hadLongRelationship,
      openAnswers: openItems.map(it=>({q:it.label, a:(r.partnerData.answers[it.id]&&r.partnerData.answers[it.id].text)||""}))
    };
    try{
      const resp = await fetch(AI_ENDPOINT, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ me, partner, compatibility: r.overall })
      });
      const data = await resp.json();
      out.innerHTML = `<div class="ai-box">${(data.text||"Nessuna risposta ricevuta.").replace(/</g,"&lt;")}</div>`;
    }catch(e){
      out.innerHTML = `<p class="err">Analisi non disponibile: la funzione AI non è raggiungibile su questo dominio. Controlla che netlify/functions/astro-analysis.js sia stato pubblicato e che ANTHROPIC_API_KEY sia impostata nelle Environment variables di Netlify.</p>`;
    }
    btn.disabled = false; btn.textContent = "Rigenera analisi";
  };

  document.getElementById("btnBackToWaiting").onclick = ()=>{ screen="waiting"; render(); };
}

render();
</script>
